name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Auto-bump the patch version ─────────────────────────────────────────
      # Reads current version.json, increments patch (1.0.0 → 1.0.1), writes it
      # back and sets VERSION / TAG outputs for all subsequent steps.
      - name: Auto-bump patch version
        id: ver
        shell: pwsh
        run: |
          $json    = Get-Content version.json | ConvertFrom-Json
          $parts   = $json.version -split '\.'
          $parts[2] = [int]$parts[2] + 1
          $newVer  = $parts -join '.'
          $newTag  = "v$newVer"

          $json.version      = $newVer
          $json.download_url = "https://github.com/${{ github.repository }}/releases/download/$newTag/KPI_Assistant.exe"
          $json | ConvertTo-Json | Set-Content version.json -Encoding utf8

          echo "VERSION=$newVer" >> $env:GITHUB_OUTPUT
          echo "TAG=$newTag"     >> $env:GITHUB_OUTPUT
          Write-Output "Bumped to $newVer"

      # ── Commit bumped version.json before the build ─────────────────────────
      # Committed first so the EXE baked by PyInstaller reflects the new version.
      - name: Commit version bump
        shell: pwsh
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git commit -m "ci: bump version to ${{ steps.ver.outputs.VERSION }} [skip ci]"
          git push

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build standalone EXE
        run: pyinstaller KPI_assistant.spec

      - name: Verify EXE exists
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\KPI_Assistant.exe")) {
            Write-Error "Build failed — dist\KPI_Assistant.exe not found"
            exit 1
          }
          $size = (Get-Item "dist\KPI_Assistant.exe").length / 1MB
          Write-Output "EXE size: $([math]::Round($size,1)) MB"

      # ── Extract release notes for this version from CHANGELOG.md ────────────
      - name: Extract changelog entry
        id: changelog
        shell: pwsh
        run: |
          $ver     = "${{ steps.ver.outputs.VERSION }}"
          $content = Get-Content CHANGELOG.md -Raw
          # Grab the block between this version header and the next one
          if ($content -match "(?s)## v$ver\r?\n(.*?)(\r?\n## v|\z)") {
            $notes = $Matches[1].Trim()
          } else {
            $notes = "See commit history for changes."
          }
          # Write to a temp file to safely pass multi-line content
          $notes | Out-File release_notes.txt -Encoding utf8
          Write-Output "Extracted release notes for v$ver"

      # ── Create a new GitHub Release and upload the EXE ──────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.TAG }}
          name: "KPI Assistant ${{ steps.ver.outputs.TAG }}"
          body_path: release_notes.txt
          files: dist/KPI_Assistant.exe
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
