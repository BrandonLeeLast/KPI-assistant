name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Auto-bump the patch version ─────────────────────────────────────────
      - name: Auto-bump patch version
        id: ver
        shell: pwsh
        run: |
          $json    = Get-Content version.json | ConvertFrom-Json
          $parts   = $json.version -split '\.'
          $parts[2] = [int]$parts[2] + 1
          $newVer  = $parts -join '.'
          $newTag  = "v$newVer"

          $json.version          = $newVer
          $json.download_url     = "https://github.com/${{ github.repository }}/releases/download/$newTag/KPEye_Setup.exe"
          $json.release_notes    = ""
          $json | ConvertTo-Json | Set-Content version.json -Encoding utf8

          echo "VERSION=$newVer" >> $env:GITHUB_OUTPUT
          echo "TAG=$newTag"     >> $env:GITHUB_OUTPUT
          Write-Output "Bumped to $newVer"

      # ── Commit bumped version.json ───────────────────────────────────────────
      - name: Commit version bump
        shell: pwsh
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git commit -m "ci: bump version to ${{ steps.ver.outputs.VERSION }} [skip ci]"
          git push

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── Build standalone EXE ─────────────────────────────────────────────────
      - name: Bake worker token into build
        shell: pwsh
        run: |
          $token = "${{ secrets.KPI_WORKER_TOKEN }}"
          if ($token) {
            $token | Out-File "_token.txt" -Encoding utf8 -NoNewline
            Write-Output "Token baked in."
          } else {
            Write-Output "KPI_WORKER_TOKEN secret not set — token will be empty."
            "" | Out-File "_token.txt" -Encoding utf8 -NoNewline
          }

      - name: Build standalone EXE
        run: pyinstaller KPI_assistant.spec

      - name: Verify EXE exists
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\KPEye.exe")) {
            Write-Error "Build failed — dist\KPEye.exe not found"
            exit 1
          }
          $size = (Get-Item "dist\KPEye.exe").length / 1MB
          Write-Output "EXE size: $([math]::Round($size,1)) MB"

      # ── Install Inno Setup and build installer ───────────────────────────────
      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          echo "Inno Setup installed"

      - name: Generate installer assets
        shell: pwsh
        run: python installer/make_assets.py

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          $ver  = "${{ steps.ver.outputs.VERSION }}"
          & $iscc "installer\setup.iss" "/DMyAppVersion=$ver"
          if (-not (Test-Path "dist\KPEye_Setup.exe")) {
            Write-Error "Installer build failed — dist\KPEye_Setup.exe not found"
            exit 1
          }
          $size = (Get-Item "dist\KPEye_Setup.exe").length / 1MB
          Write-Output "Installer size: $([math]::Round($size,1)) MB"

      # ── Extract changelog entry ──────────────────────────────────────────────
      - name: Extract changelog entry
        id: changelog
        shell: pwsh
        run: |
          $ver     = "${{ steps.ver.outputs.VERSION }}"
          $content = Get-Content CHANGELOG.md -Raw
          if ($content -match "(?s)## v$ver\r?\n(.*?)(\r?\n## v|\z)") {
            $notes = $Matches[1].Trim()
          } else {
            $notes = "See commit history for changes."
          }
          $notes | Out-File release_notes.txt -Encoding utf8
          Write-Output "Extracted release notes for v$ver"

      # ── Create GitHub Release with both EXE and installer ───────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.TAG }}
          name: "KPEye ${{ steps.ver.outputs.TAG }}"
          body_path: release_notes.txt
          files: |
            dist/KPEye_Setup.exe
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
